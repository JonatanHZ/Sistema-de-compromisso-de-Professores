<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/login.css"/>
    <link rel="shortcut icon" href="img/ProfPlanner.ico" type="image/x-icon">
    <title>Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />  
  </head>

  <body>
    
    <div class="container" id="container">
      <!-- CRIAR NOVA CONTA -->
      <div class="form-container criar-cont">
        <form>
          <h1>Criar Conta</h1>
          <span>ou use seu email para se registrar</span>

          <input type="text" name="nome" placeholder="Nome" required>
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="senha" placeholder="Senha" required />

          <button type="button" onclick="registrar()">Registrar</button>
        </form>
      </div>

      <!-- ENTRAR NA CONTA -->
      <div class="form-container entrar">
        <form>
          <h1>Entrar</h1>
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="senha" placeholder="Senha" required />
          <a href="#" id="esquecer-senha">Esqueceu sua senha?</a>
          <button type="button" onclick="entrar()">Entrar</button>
        </form>
      </div>

      <!-- ALTERNADOR ENTRE "CRIAR CONTA" E "ENTRAR" -->
      <div class="alternar-container">
        <div class="alternar">
          <div class="alternar-panel alternar-esquerda">
            <h1>Entrar</h1>
            <p>Já possui uma conta? Click no botão abaixo.</p>
            <button class="hidden" id="login">Login</button>
          </div>

          <div class="alternar-panel alternar-direita">
            <h1>Criar Conta</h1>
            <p>Não possui uma conta? Click no botão abaixo para criar.</p>
            <button class="hidden" id="registra">Criar conta</button>
          </div>
        </div>
      </div>
    </div>
    
   
    <!-- Cod JavaScript -->
    <script src="js/script.js"></script>
  </body>
</html>
